  :root {
    --bg:#0c0c0e; --surface:#161619; --surface2:#1e1e23; --border:#2c2c34;
    --text:#e8e8f0; --muted:#6b6b7a;
    --gain:#00e676; --gain-dim:rgba(0,230,118,0.1); --gain-border:rgba(0,230,118,0.35);
    --loss:#ff4d6d; --loss-dim:rgba(255,77,109,0.1); --loss-border:rgba(255,77,109,0.35);
    --accent:#7c6af7; --accent-dim:rgba(124,106,247,0.12);
    --mono:'DM Mono',monospace; --display:'Syne',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html, body {
    font-family:'DM Mono',monospace !important;
    -webkit-font-smoothing:antialiased;
  }
  body{background:var(--bg);color:var(--text);min-height:100vh;padding:28px 16px 60px;}
  .container{max-width:480px;margin:0 auto;}

  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:10px;}
  .logo{font-family:'Syne',sans-serif !important;font-size:22px;font-weight:800;letter-spacing:-0.5px;flex-shrink:0;}
  .logo span{color:var(--accent);}

  .nav-right{display:flex;align-items:center;gap:8px;}
  .month-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:7px 12px;}
  .month-nav button{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;font-family:'DM Mono',monospace !important;}
  .month-nav button:active{color:var(--accent);}
  #monthLabel{font-family:'Syne',sans-serif !important;font-weight:700;font-size:13px;min-width:90px;text-align:center;}

  .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:7px 12px;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s;font-family:'DM Mono',monospace !important;}
  .filter-btn:active{border-color:var(--accent);color:var(--accent);}

  .picker-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:200;align-items:flex-end;justify-content:center;}
  .picker-overlay.open{display:flex;}
  .picker-sheet{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;animation:slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .picker-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .picker-title{font-family:'DM Mono',monospace !important;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;}
  .picker-row{display:flex;gap:10px;margin-bottom:16px;}
  .picker-select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Syne',sans-serif !important;font-size:15px;font-weight:700;padding:13px 14px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center;}
  .picker-select:focus{border-color:var(--accent);}
  .picker-apply{width:100%;background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif !important;font-size:16px;font-weight:800;padding:15px;cursor:pointer;margin-top:4px;}
  .picker-apply:active{transform:scale(0.97);}

  .totals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px;}
  .total-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 10px;text-align:center;}
  .total-card.net{border-color:rgba(124,106,247,0.3);background:var(--accent-dim);}
  .total-card.gains{border-color:var(--gain-border);background:var(--gain-dim);}
  .total-card.losses{border-color:var(--loss-border);background:var(--loss-dim);}
  .total-label{font-family:'DM Mono',monospace !important;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .total-amount{font-family:'Syne',sans-serif !important;font-size:16px;font-weight:800;letter-spacing:-0.5px;}
  .total-card.net .total-amount{color:var(--text);}
  .total-card.gains .total-amount{color:var(--gain);}
  .total-card.losses .total-amount{color:var(--loss);}

  .day-names{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
  .day-name{font-family:'DM Mono',monospace !important;text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-cell{aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:transform 0.15s;padding:4px 2px;}
  .cal-cell.empty{background:transparent;border-color:transparent;pointer-events:none;}
  .cal-cell:active{transform:scale(0.92);}
  .cal-cell.today{border-color:var(--accent);background:var(--accent-dim);}
  .cal-cell.has-gain{background:var(--gain-dim);border-color:var(--gain-border);}
  .cal-cell.has-loss{background:var(--loss-dim);border-color:var(--loss-border);}
  .cal-cell.has-both{background:var(--accent-dim);border-color:rgba(124,106,247,0.4);}
  .cell-day{font-family:'DM Mono',monospace !important;font-size:11px;color:var(--muted);line-height:1;}
  .today .cell-day{color:var(--accent);font-weight:700;}
  .cell-amount{font-family:'Syne',sans-serif !important;font-size:10px;font-weight:700;line-height:1;text-align:center;word-break:break-all;padding:0 2px;}
  .cell-plus{font-family:'DM Mono',monospace !important;font-size:18px;color:var(--border);line-height:1;}

  .monthly-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
  .summary-big{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 16px;}
  .summary-big.entries-card{border-color:var(--gain-border);background:var(--gain-dim);}
  .summary-big.depenses-card{border-color:var(--loss-border);background:var(--loss-dim);}
  .summary-big-label{font-family:'DM Mono',monospace !important;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
  .summary-big-amount{font-family:'Syne',sans-serif !important;font-size:22px;font-weight:800;letter-spacing:-1px;margin-bottom:12px;}
  .summary-big.entries-card .summary-big-amount{color:var(--gain);}
  .summary-big.depenses-card .summary-big-amount{color:var(--loss);}
  .summary-list{display:flex;flex-direction:column;gap:5px;max-height:140px;overflow-y:auto;}
  .summary-list::-webkit-scrollbar{display:none;}
  .summary-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(0,0,0,0.2);border-radius:9px;}
  .summary-item-day{font-family:'DM Mono',monospace !important;font-size:11px;color:var(--muted);}
  .summary-item-val{font-family:'Syne',sans-serif !important;font-size:13px;font-weight:700;}
  .summary-item-val.gain{color:var(--gain);}
  .summary-item-val.loss{color:var(--loss);}
  .summary-empty{font-family:'DM Mono',monospace !important;font-size:12px;color:var(--muted);text-align:center;padding:8px 0;}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:100;align-items:flex-end;justify-content:center;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-title{font-family:'Syne',sans-serif !important;font-size:17px;font-weight:700;text-transform:capitalize;}
  .modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace !important;}
  .day-net{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface2);border-radius:14px;margin-bottom:14px;}
  .day-net-label{font-family:'DM Mono',monospace !important;font-size:12px;color:var(--muted);}
  .day-net-amount{font-family:'Syne',sans-serif !important;font-size:22px;font-weight:800;letter-spacing:-0.5px;}
  .entries{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;max-height:160px;overflow-y:auto;}
  .entries::-webkit-scrollbar{display:none;}
  .entry-row{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
  .entry-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .entry-dot.gain{background:var(--gain);}
  .entry-dot.loss{background:var(--loss);}
  .entry-val{flex:1;font-family:'Syne',sans-serif !important;font-size:16px;font-weight:700;}
  .entry-val.gain{color:var(--gain);}
  .entry-val.loss{color:var(--loss);}
  .entry-del{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 6px;font-family:'DM Mono',monospace !important;}
  .entry-del:active{color:var(--loss);}
  .empty-msg{font-family:'DM Mono',monospace !important;text-align:center;color:var(--muted);font-size:13px;padding:10px 0;}
  .add-form{display:flex;flex-direction:column;gap:12px;}
  .amount-input{background:var(--surface2);border:2px solid var(--border);border-radius:14px;color:var(--text);font-family:'Syne',sans-serif !important;font-size:28px;font-weight:800;padding:16px;text-align:center;outline:none;width:100%;letter-spacing:-1px;transition:border-color 0.2s,color 0.2s;-webkit-appearance:none;}
  .amount-input.gain-mode{border-color:var(--gain);color:var(--gain);}
  .amount-input.loss-mode{border-color:var(--loss);color:var(--loss);}
  .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .type-btn{padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif !important;font-size:16px;font-weight:700;transition:all 0.2s;}
  .type-btn.active-gain{background:var(--gain-dim);border-color:var(--gain);color:var(--gain);}
  .type-btn.active-loss{background:var(--loss-dim);border-color:var(--loss);color:var(--loss);}
  .btn-add{background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif !important;font-size:17px;font-weight:800;padding:16px;cursor:pointer;transition:all 0.15s;}
  .btn-add:active{transform:scale(0.97);background:#9281fa;}
  .btn-add.shake{animation:shake 0.3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">cash<span>.</span>flow</div>
    <div class="nav-right">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#8249;</button>
        <div id="monthLabel"></div>
        <button onclick="changeMonth(1)">&#8250;</button>
      </div>
      <button class="filter-btn" onclick="openPicker()" title="Choisir mois/annee">&#9776;</button>
    </div>
  </header>

  <div class="totals">
    <div class="total-card net">
      <div class="total-label">Total Mois</div>
      <div class="total-amount" id="totalNet">0</div>
    </div>
    <div class="total-card gains">
      <div class="total-label">Entree</div>
      <div class="total-amount" id="totalGains">+0</div>
    </div>
    <div class="total-card losses">
      <div class="total-label">Depense</div>
      <div class="total-amount" id="totalLosses">-0</div>
    </div>
  </div>

  <div class="day-names" id="dayNames"></div>
  <div class="cal-grid" id="calGrid"></div>

  <div class="monthly-summary">
    <div class="summary-big entries-card">
      <div class="summary-big-label">Toutes les entrees</div>
      <div class="summary-big-amount" id="sumGainTotal">+0 MAD</div>
      <div class="summary-list" id="sumGainList"></div>
    </div>
    <div class="summary-big depenses-card">
      <div class="summary-big-label">Toutes les depenses</div>
      <div class="summary-big-amount" id="sumLossTotal">-0 MAD</div>
      <div class="summary-list" id="sumLossList"></div>
    </div>
  </div>

</div>

<!-- PICKER -->
<div class="picker-overlay" id="pickerOverlay" onclick="handlePickerOverlay(event)">
  <div class="picker-sheet">
    <div class="picker-handle"></div>
    <div class="picker-title">Selectionner une periode</div>
    <div class="picker-row">
      <select class="picker-select" id="pickerMonth"></select>
      <select class="picker-select" id="pickerYear"></select>
    </div>
    <button class="picker-apply" onclick="applyPicker()">Appliquer</button>
  </div>
</div>

<!-- MODAL DAY -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="day-net" id="dayNetBox" style="display:none">
      <span class="day-net-label">Net du jour</span>
      <span class="day-net-amount" id="dayNetAmount"></span>
    </div>
    <div class="entries" id="entriesList"></div>
    <div class="add-form">
      <input type="number" class="amount-input gain-mode" id="inputAmount" placeholder="0 MAD" inputmode="decimal" min="0"/>
      <div class="type-toggle">
        <button class="type-btn active-gain" id="btnGain" onclick="setType('gain')">+ Entree</button>
        <button class="type-btn" id="btnLoss" onclick="setType('loss')">- Depense</button>
      </div>
      <button class="btn-add" id="btnAdd" onclick="addEntry()">Ajouter</button>
    </div>
  </div>
</div>

<script>
var DAYS_S=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
var MONTHS=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
var DAYS_L=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
var now=new Date();
var curM=now.getMonth(),curY=now.getFullYear(),selDay=null,curType='gain';

function key(){return 'cf_'+curY+'_'+curM;}
function load(){try{return JSON.parse(localStorage.getItem(key()))||{};}catch{return {};}}
function save(d){localStorage.setItem(key(),JSON.stringify(d));}
function netDay(arr){return arr.reduce(function(a,e){return a+(e.type==='gain'?e.amount:-e.amount);},0);}

function fmtShort(n){
  var abs=Math.abs(n);
  if(abs>=10000)return(n<0?'-':'+')+Math.round(abs/1000)+'k';
  if(abs>=1000)return(n<0?'-':'+')+parseFloat((abs/1000).toFixed(1))+'k';
  return(n<0?'-':'+')+Math.round(abs);
}
function fmtFull(n){return(n>=0?'+':'-')+Math.abs(n).toLocaleString('fr-FR')+' MAD';}

function render(){
  var data=load(),today=new Date();
  document.getElementById('dayNames').innerHTML=DAYS_S.map(function(d){return'<div class="day-name">'+d+'</div>';}).join('');
  document.getElementById('monthLabel').textContent=MONTHS[curM].substring(0,3).toUpperCase()+' '+curY;

  var firstDow=new Date(curY,curM,1).getDay();
  var offset=firstDow===0?6:firstDow-1;
  var dim=new Date(curY,curM+1,0).getDate();
  var html='';
  for(var i=0;i<offset;i++)html+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=dim;d++){
    var entries=data[d]||[];
    var net=netDay(entries);
    var hasG=entries.some(function(e){return e.type==='gain';});
    var hasL=entries.some(function(e){return e.type==='loss';});
    var isTd=d===today.getDate()&&curM===today.getMonth()&&curY===today.getFullYear();
    var cls='cal-cell'+(isTd?' today':'')+(hasG&&hasL?' has-both':hasG?' has-gain':hasL?' has-loss':'');
    var inner='<div class="cell-day">'+d+'</div>';
    if(entries.length>0){
      var col=net>=0?'var(--gain)':'var(--loss)';
      inner+='<div class="cell-amount" style="color:'+col+'">'+fmtShort(net)+'</div>';
    }else{inner+='<div class="cell-plus">+</div>';}
    html+='<div class="'+cls+'" onclick="openModal('+d+')">'+inner+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;

  var gains=0,losses=0;
  var gainRows=[],lossRows=[];
  for(var day in data){
    var arr=data[day];
    var dGain=0,dLoss=0;
    arr.forEach(function(e){if(e.type==='gain')dGain+=e.amount;else dLoss+=e.amount;});
    gains+=dGain;losses+=dLoss;
    if(dGain>0)gainRows.push({day:parseInt(day),amount:dGain});
    if(dLoss>0)lossRows.push({day:parseInt(day),amount:dLoss});
  }
  gainRows.sort(function(a,b){return a.day-b.day;});
  lossRows.sort(function(a,b){return a.day-b.day;});

  var net=gains-losses;
  var netEl=document.getElementById('totalNet');
  netEl.textContent=fmtShort(net);
  netEl.style.color=net>=0?'var(--gain)':'var(--loss)';
  document.getElementById('totalGains').textContent='+'+Math.round(gains).toLocaleString('fr-FR');
  document.getElementById('totalLosses').textContent='-'+Math.round(losses).toLocaleString('fr-FR');

  document.getElementById('sumGainTotal').textContent='+'+gains.toLocaleString('fr-FR')+' MAD';
  document.getElementById('sumLossTotal').textContent='-'+losses.toLocaleString('fr-FR')+' MAD';

  var gl=document.getElementById('sumGainList');
  if(gainRows.length===0){gl.innerHTML='<div class="summary-empty">Aucune entree ce mois</div>';}
  else{gl.innerHTML=gainRows.map(function(r){return'<div class="summary-item"><span class="summary-item-day">Jour '+r.day+'</span><span class="summary-item-val gain">+'+r.amount.toLocaleString('fr-FR')+'</span></div>';}).join('');}

  var ll=document.getElementById('sumLossList');
  if(lossRows.length===0){ll.innerHTML='<div class="summary-empty">Aucune depense ce mois</div>';}
  else{ll.innerHTML=lossRows.map(function(r){return'<div class="summary-item"><span class="summary-item-day">Jour '+r.day+'</span><span class="summary-item-val loss">-'+r.amount.toLocaleString('fr-FR')+'</span></div>';}).join('');}
}

function openPicker(){
  var ms=document.getElementById('pickerMonth');
  var ys=document.getElementById('pickerYear');
  ms.innerHTML=MONTHS.map(function(m,i){return'<option value="'+i+'"'+(i===curM?' selected':'')+'>'+m+'</option>';}).join('');
  ys.innerHTML='';
  for(var y=now.getFullYear()-5;y<=now.getFullYear()+2;y++){ys.innerHTML+='<option value="'+y+'"'+(y===curY?' selected':'')+'>'+y+'</option>';}
  document.getElementById('pickerOverlay').classList.add('open');
}
function applyPicker(){
  curM=parseInt(document.getElementById('pickerMonth').value);
  curY=parseInt(document.getElementById('pickerYear').value);
  document.getElementById('pickerOverlay').classList.remove('open');
  render();
}
function handlePickerOverlay(e){if(e.target===document.getElementById('pickerOverlay'))document.getElementById('pickerOverlay').classList.remove('open');}

function openModal(d){
  selDay=d;curType='gain';
  document.getElementById('inputAmount').value='';
  updateInputStyle();
  var dt=new Date(curY,curM,d);
  document.getElementById('modalTitle').textContent=DAYS_L[dt.getDay()]+' '+d+' '+MONTHS[curM];
  renderEntries();
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){document.getElementById('inputAmount').focus();},350);
}
function renderEntries(){
  var data=load(),entries=data[selDay]||[];
  var list=document.getElementById('entriesList');
  var netBox=document.getElementById('dayNetBox');
  if(entries.length===0){list.innerHTML='<div class="empty-msg">Aucune entree - ajoute ton premier montant</div>';netBox.style.display='none';return;}
  list.innerHTML=entries.map(function(e,i){return'<div class="entry-row"><div class="entry-dot '+e.type+'"></div><div class="entry-val '+e.type+'">'+(e.type==='gain'?'+':'-')+e.amount.toLocaleString('fr-FR')+' MAD</div><button class="entry-del" onclick="delEntry('+i+')">&#10005;</button></div>';}).join('');
  var net=netDay(entries);
  var na=document.getElementById('dayNetAmount');
  na.textContent=fmtFull(net);
  na.style.color=net>=0?'var(--gain)':'var(--loss)';
  netBox.style.display='flex';
}
function delEntry(i){
  var data=load();
  if(!data[selDay])return;
  data[selDay].splice(i,1);
  if(data[selDay].length===0)delete data[selDay];
  save(data);renderEntries();render();
}
function setType(t){
  curType=t;
  document.getElementById('btnGain').className=t==='gain'?'type-btn active-gain':'type-btn';
  document.getElementById('btnLoss').className=t==='loss'?'type-btn active-loss':'type-btn';
  updateInputStyle();
}
function updateInputStyle(){
  document.getElementById('inputAmount').className='amount-input '+(curType==='gain'?'gain-mode':'loss-mode');
}
function addEntry(){
  var val=parseFloat(document.getElementById('inputAmount').value);
  if(!val||val<=0){var btn=document.getElementById('btnAdd');btn.classList.add('shake');setTimeout(function(){btn.classList.remove('shake');},300);return;}
  var data=load();
  if(!data[selDay])data[selDay]=[];
  data[selDay].push({amount:val,type:curType});
  save(data);
  document.getElementById('inputAmount').value='';
  renderEntries();render();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');selDay=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function changeMonth(delta){
  curM+=delta;
  if(curM>11){curM=0;curY++;}
  if(curM<0){curM=11;curY--;}
  render();
}
document.getElementById('inputAmount').addEventListener('keydown',function(e){if(e.key==='Enter')addEntry();});
render();
</script>
</body>
</html>
